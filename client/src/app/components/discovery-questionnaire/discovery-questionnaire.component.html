<div class="discovery-header">
  <h3>{{ workloadLabel }} — discovery checklist</h3>
  <p>Capture notes during the call. Nothing here is saved automatically — export when you're done.</p>
</div>

<div class="question-block" *ngFor="let q of questions; let i = index">
  <label class="question-label">{{ i + 1 }}. {{ q.question }}</label>
  <textarea
    rows="2"
    placeholder="Notes from the call…"
    [(ngModel)]="q.notes"
  ></textarea>
</div>

<button class="btn btn-primary" (click)="export()" [disabled]="!questions.length">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  Export call notes (PDF)
</button>
